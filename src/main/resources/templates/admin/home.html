<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>작업 문서 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/common.css" th:href="@{/css/common.css}">
    <link rel="stylesheet" href="../../static/css/home.css" th:href="@{/css/home.css}">
</head>

<body>
<!-- 상단 헤더 -->
<header th:replace="~{fragments/header :: header('home')}"></header>


<main class="main-container">

    <!-- 소개 영역 -->
    <section class="hero-section">

        <span class="hero-badge">
            <span class="badge-dot"></span>
            작업 안전 문서 관리 시스템
        </span>

        <h1 class="hero-title">
            작업별 SOP · 위험성평가서를<br>
            한 곳에서 관리합니다
        </h1>

        <p class="hero-description">
            작업명을 등록하고 해당 공정의 표준작업절차서와 위험성평가서를 직접<br
                class="desktop-break">
            연결하여 현장에서 언제든지 조회할 수 있습니다.
        </p>

    </section>


    <!-- 주요 메뉴 -->
    <section class="quick-menu-grid">

        <a th:href="@{/create}"
           class="quick-menu-card quick-menu-card-primary">

            <i class="bi bi-plus-square quick-menu-icon"></i>

            <h2>작업 등록</h2>

            <p>
                새 작업을 등록하고 SOP · 위험성평가서를 첨부합니다
            </p>
        </a>


        <a th:href="@{/list}"
           class="quick-menu-card">

            <i class="bi bi-card-list quick-menu-icon"></i>

            <h2>작업 목록 조회</h2>

            <p>
                등록된 전체 작업 목록을 확인합니다
            </p>
        </a>
    </section>


    <!-- 하단 현황 -->
    <section class="dashboard-grid">

        <!-- 현황 카드 -->
        <article class="dashboard-card status-card">

            <h2 class="dashboard-title">현황</h2>

            <dl class="status-list">
                <div class="status-item">
                    <dt>등록 작업</dt>

                    <dd>
                        <strong th:text="${workCount}">6</strong>
                        <span>건</span>
                    </dd>
                </div>

                <div class="status-item">
                    <dt>SOP 등록</dt>

                    <dd>
                        <strong th:text="${sopCount}">3</strong>
                        <span>건</span>
                    </dd>
                </div>

                <div class="status-item">
                    <dt>위험성평가 등록</dt>

                    <dd>
                        <strong th:text="${riskCount}">3</strong>
                        <span>건</span>
                    </dd>
                </div>
            </dl>

        </article>


        <!-- 최근 등록 작업 -->
        <article class="dashboard-card recent-card">

            <h2 class="dashboard-title">최근 등록 작업</h2>

            <div class="recent-work-list">

                <!-- 실제 데이터 -->
                <a
                        th:each="work : ${recentWorks}"
                        th:href="@{/works/{id}(id=${work.id})}"
                        class="recent-work-item"
                >
                    <div>
                        <h3 th:text="${work.name}">
                            작업명
                        </h3>

                        <div class="document-tags">
                            <span
                                    class="document-tag"
                                    th:if="${work.hasSop}"
                            >
                                SOP
                            </span>

                            <span
                                    class="document-tag"
                                    th:if="${work.hasRiskAssessment}"
                            >
                                위험성평가
                            </span>
                        </div>
                    </div>

                    <i class="bi bi-chevron-right recent-arrow"></i>
                </a>


                <!-- 데이터가 없을 때 -->
                <div
                        class="empty-recent-work"
                        th:if="${#lists.isEmpty(recentWorks)}"
                >
                    최근 등록된 작업이 없습니다.
                </div>

            </div>

        </article>

    </section>

</main>

</body>
</html>
