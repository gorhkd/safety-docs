<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>작업 등록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}" href="../../../static/css/common.css">
    <link rel="stylesheet" th:href="@{/css/create.css}" href="../../../static/css/create.css">
</head>

<body>
<header th:replace="~{fragments/header :: header('create')}"></header>
<main class="create-page">

    <section class="page-header">
        <h1>작업 등록</h1>

        <p>
            작업명과 관련 문서(SOP, 위험성평가서)를 등록합니다.
        </p>
    </section>


    <form
            th:action="@{/create}"
            th:object="${work}"
            method="post"
            enctype="multipart/form-data"
            class="work-form"
    >

        <div class="form-card">

            <!-- 작업명 -->
            <section class="form-section work-name-section">

                <label for="title" class="field-label">
                    작업명 (공정명)
                    <span class="required-mark">*</span>
                </label>

                <input
                        type="text"
                        id="title"
                        th:field="*{title}"
                        class="work-name-input"
                        th:errorclass="input-error"
                        placeholder="예: 정압기 분해점검, 배관 용접..."
                        maxlength="100"
                        required
                        autofocus
                >

                <p
                        class="field-error"
                        th:if="${#fields.hasErrors('title')}"
                        th:errors="*{title}"
                >
                    작업명을 입력해주세요.
                </p>

            </section>


            <!-- SOP 파일 -->
            <section class="form-section">

                <h2 class="document-title sop-title">
                    <span class="document-dot"></span>
                    표준작업절차서 (SOP)
                </h2>

                <label
                        for="sopFile"
                        class="upload-box"
                        data-input="sopFile"
                >
                    <input
                            type="file"
                            id="sopFile"
                            name="sopFile"
                            class="upload-input"
                            accept="application/pdf,.pdf"
                    >

                    <i class="bi bi-file-earmark-arrow-up upload-icon"></i>

                    <span class="upload-message">
                        PDF 파일을 드래그하거나
                        <strong>클릭하여 업로드</strong>
                    </span>

                    <span class="upload-description">
                        PDF 형식만 지원 · 파일당 1개 업로드 가능
                    </span>

                    <span class="selected-file-name">
                        선택된 파일 없음
                    </span>
                </label>

            </section>


            <!-- 위험성평가 파일 -->
            <section class="form-section">

                <h2 class="document-title risk-title">
                    <span class="document-dot"></span>
                    위험성평가서
                </h2>

                <label
                        for="riskFile"
                        class="upload-box risk-upload-box"
                        data-input="riskFile"
                >
                    <input
                            type="file"
                            id="riskFile"
                            name="riskFile"
                            class="upload-input"
                            accept="application/pdf,.pdf"
                    >

                    <i class="bi bi-file-earmark-arrow-up upload-icon"></i>

                    <span class="upload-message">
                        PDF 파일을 드래그하거나
                        <strong>클릭하여 업로드</strong>
                    </span>

                    <span class="upload-description">
                        PDF 형식만 지원 · 파일당 1개 업로드 가능
                    </span>

                    <span class="selected-file-name">
                        선택된 파일 없음
                    </span>
                </label>

            </section>

        </div>


        <!-- 하단 버튼 -->
        <div class="form-actions">

            <a th:href="@{/home}"
               class="cancel-button">
                취소
            </a>

            <button type="submit"
                    class="submit-button">
                작업 등록
            </button>

        </div>

    </form>

</main>

<script th:src="@{/js/file-upload.js}"></script>

</body>
</html>
