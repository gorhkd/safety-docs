<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title th:text="|${work.name} - 작업 문서 관리|">
        작업 상세
    </title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
            rel="stylesheet"
    >

    <link rel="stylesheet"
          th:href="@{/css/common.css}" href="../../../static/css/work-detail.css">

    <link rel="stylesheet"
          th:href="@{/css/work-detail.css}">
</head>

<body>

<!-- 공통 헤더 -->
<header th:replace="~{fragments/header :: header('list')}"></header>


<main class="work-detail-page">

    <!-- 경로 표시 -->
    <nav class="breadcrumb-navigation"
         aria-label="현재 위치">

        <a th:href="@{/works}">
            작업 목록
        </a>

        <i class="bi bi-chevron-right"></i>

        <span th:text="${work.name}">
            정압기 분해점검
        </span>

    </nav>


    <!-- 작업 제목 -->
    <section class="detail-header">

        <div>
            <h1 th:text="${work.name}">
                정압기 분해점검
            </h1>

            <p>
                등록일:
                <span th:text="${work.createdDate}">
                    2026.06.15
                </span>
            </p>
        </div>

        <a
                th:href="@{/works/{id}/shares(id=${work.id})}"
                class="share-link-button"
        >
            <i class="bi bi-box-arrow-up-right"></i>
            공유 링크
        </a>

    </section>


    <!-- SOP 문서 -->
    <section class="document-card sop-card">

        <header class="document-card-header">

            <h2>
                <span class="document-dot"></span>
                표준작업절차서 (SOP)
            </h2>

            <span
                    class="document-count"
                    th:text="|${#lists.size(sopDocuments)}건|"
            >
                1건
            </span>

        </header>


        <div class="document-list">

            <!-- 등록된 SOP 문서 -->
            <article
                    class="document-item"
                    th:each="document : ${sopDocuments}"
            >

                <div class="document-information">

                    <span class="document-icon">
                        <i class="bi bi-file-earmark-text-fill"></i>
                    </span>

                    <div>
                        <h3 th:text="${document.originalFileName}">
                            정압기 분해점검 SOP v2.1.pdf
                        </h3>

                        <p>
                            <span th:text="${document.fileSizeText}">
                                1.2 MB
                            </span>

                            <span class="information-divider">·</span>

                            <span th:text="${document.createdDate}">
                                2026.06.15
                            </span>
                        </p>
                    </div>

                </div>

                <a
                        th:href="@{/documents/{id}/view(id=${document.id})}"
                        class="document-open-button"
                        target="_blank"
                        rel="noopener noreferrer"
                >
                    <i class="bi bi-arrow-up-right"></i>
                    열람
                </a>

            </article>


            <!-- SOP 미등록 -->
            <div
                    class="empty-document"
                    th:if="${#lists.isEmpty(sopDocuments)}"
            >
                등록된 표준작업절차서가 없습니다.
            </div>

        </div>

    </section>


    <!-- 위험성평가서 -->
    <section class="document-card risk-card">

        <header class="document-card-header">

            <h2>
                <span class="document-dot"></span>
                위험성평가서
            </h2>

            <span
                    class="document-count"
                    th:text="|${#lists.size(riskDocuments)}건|"
            >
                1건
            </span>

        </header>


        <div class="document-list">

            <!-- 등록된 위험성평가서 -->
            <article
                    class="document-item"
                    th:each="document : ${riskDocuments}"
            >

                <div class="document-information">

                    <span class="document-icon">
                        <i class="bi bi-file-earmark-text-fill"></i>
                    </span>

                    <div>
                        <h3 th:text="${document.originalFileName}">
                            정압기 분해점검 위험성평가서.pdf
                        </h3>

                        <p>
                            <span th:text="${document.fileSizeText}">
                                869.1 KB
                            </span>

                            <span class="information-divider">·</span>

                            <span th:text="${document.createdDate}">
                                2026.06.15
                            </span>
                        </p>
                    </div>

                </div>

                <a
                        th:href="@{/documents/{id}/view(id=${document.id})}"
                        class="document-open-button"
                        target="_blank"
                        rel="noopener noreferrer"
                >
                    <i class="bi bi-arrow-up-right"></i>
                    열람
                </a>

            </article>


            <!-- 위험성평가서 미등록 -->
            <div
                    class="empty-document"
                    th:if="${#lists.isEmpty(riskDocuments)}"
            >
                등록된 위험성평가서가 없습니다.
            </div>

        </div>

    </section>

</main>

</body>
</html>
