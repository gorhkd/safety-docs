<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>작업 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}" href="../../../static/css/work-list.css">
    <link rel="stylesheet" th:href="@{/css/work-list.css}">
</head>

<body>
<header th:replace="~{fragments/header :: header('list')}"></header>
<main class="work-list-page">

    <section class="page-header">
        <h1>작업 목록</h1>
        <p> 총 <strong th:text="${totalCount}">4</strong>개 작업이 등록되어 있습니다 </p>
    </section>

    <form th:action="@{/works}" method="get" class="search-form">
        <div class="search-box">
            <i class="bi bi-search search-icon"></i>

            <input
                    type="search"
                    name="keyword"
                    th:value="${keyword}"
                    placeholder="작업명 검색..."
                    aria-label="작업명 검색"
            >
        </div>
    </form>

    <section class="work-table-wrapper">

        <table class="work-table">

            <thead>
            <tr>
                <th class="work-name-column">작업명</th>
                <th class="document-column">SOP</th>
                <th class="document-column">위험성평가</th>
                <th class="date-column">등록일</th>
            </tr>
            </thead>

            <tbody>

            <!-- 작업 데이터 -->
            <tr th:each="work : ${works}">

                <!-- 작업명 -->
                <td class="work-name-cell">
                    <a
                            th:href="@{/works/{id}(id=${work.id})}"
                            th:text="${work.name}"
                    >
                        정압기 분해점검
                    </a>
                </td>


                <!-- SOP 등록 상태 -->
                <td class="document-cell">

                    <span
                            class="document-status registered"
                            th:if="${work.sopCount != null and work.sopCount > 0}"
                    >
                        <i class="bi bi-check-circle-fill"></i>

                        <span th:text="|${work.sopCount}건|">
                            1건
                        </span>
                    </span>

                    <span
                            class="document-status unregistered"
                            th:unless="${work.sopCount != null and work.sopCount > 0}"
                    >
                        미등록
                    </span>

                </td>


                <!-- 위험성평가 등록 상태 -->
                <td class="document-cell">

                    <span
                            class="document-status registered"
                            th:if="${work.riskCount != null and work.riskCount > 0}"
                    >
                        <i class="bi bi-check-circle-fill"></i>

                        <span th:text="|${work.riskCount}건|">
                            1건
                        </span>
                    </span>

                    <span
                            class="document-status unregistered"
                            th:unless="${work.riskCount != null and work.riskCount > 0}"
                    >
                        미등록
                    </span>

                </td>


                <!-- 등록일 -->
                <td
                        class="date-cell"
                        th:text="${work.createdDate}"
                >
                    2026.06.15
                </td>

            </tr>


            <!-- 검색 결과 또는 등록 작업이 없을 때 -->
            <tr th:if="${#lists.isEmpty(works)}">
                <td colspan="4" class="empty-table-cell">

                    <i class="bi bi-inbox empty-icon"></i>

                    <p th:if="${keyword == null or keyword.isBlank()}">
                        등록된 작업이 없습니다.
                    </p>

                    <p th:unless="${keyword == null or keyword.isBlank()}">
                        검색 조건에 맞는 작업이 없습니다.
                    </p>

                </td>
            </tr>

            </tbody>

        </table>

    </section>

</main>

</body>
</html>
